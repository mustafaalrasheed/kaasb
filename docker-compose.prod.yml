
# =============================================================================
# Kaasb Platform — Production Docker Compose
# Usage:  ./deploy.sh          (recommended)
# Manual: docker compose -f docker-compose.prod.yml --env-file .env.production up -d
# =============================================================================

services:

  # ===========================================================================
  # Nginx — reverse proxy + SSL termination
  # ===========================================================================
  nginx:
    image: nginx:1.27-alpine
    container_name: kaasb_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/502.html:/etc/nginx/error_pages/502.html:ro
      - ./docker/nginx/503.html:/etc/nginx/error_pages/503.html:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - kaasb_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"

  # ===========================================================================
  # PostgreSQL 16
  # ===========================================================================
  db:
    image: postgres:16-alpine
    container_name: kaasb_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       ${DB_NAME}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - kaasb_net
    # DB NOT exposed on host — only accessible inside kaasb_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ===========================================================================
  # Redis 7 — sessions, rate limiting, pub/sub
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: kaasb_redis
    restart: unless-stopped
    # Password-protect Redis in production
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - kaasb_net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ===========================================================================
  # FastAPI Backend
  # ===========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
      target: production
    image: ghcr.io/${GITHUB_REPO:-mustafaalrasheed/kaasb}/backend:${IMAGE_TAG:-latest}
    container_name: kaasb_backend
    restart: unless-stopped
    env_file: .env.production
    environment:
      DATABASE_URL:  "postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}"
      REDIS_URL:     "redis://:${REDIS_PASSWORD}@redis:6379/0"
      SECRET_KEY:    ${SECRET_KEY}
      ENVIRONMENT:   production
      DEBUG:         "false"
      DOMAIN:        ${DOMAIN}
      CORS_ORIGINS:  '["https://${DOMAIN}","https://www.${DOMAIN}"]'
      UPLOAD_DIR:    /app/uploads
      LOG_LEVEL:     info
      # Qi Card
      QI_CARD_MERCHANT_ID:  ${QI_CARD_MERCHANT_ID:-}
      QI_CARD_SECRET_KEY:   ${QI_CARD_SECRET_KEY:-}
      QI_CARD_BASE_URL:     ${QI_CARD_BASE_URL:-https://gateway.qi.iq/api/v1}
      QI_CARD_SANDBOX_URL:  ${QI_CARD_SANDBOX_URL:-https://sandbox.gateway.qi.iq/api/v1}
      QI_CARD_SANDBOX:      ${QI_CARD_SANDBOX:-false}
      # Stripe
      STRIPE_SECRET_KEY:      ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET:  ${STRIPE_WEBHOOK_SECRET:-}
      # Wise
      WISE_API_KEY:       ${WISE_API_KEY:-}
      WISE_PROFILE_ID:    ${WISE_PROFILE_ID:-}
      WISE_ENVIRONMENT:   production
      # SMTP (optional — for notifications)
      SMTP_HOST:     ${SMTP_HOST:-}
      SMTP_PORT:     ${SMTP_PORT:-587}
      SMTP_USER:     ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM:     ${SMTP_FROM:-noreply@kaasb.com}
      # Monitoring
      SENTRY_DSN:          ${SENTRY_DSN:-}
      HEALTH_BEARER_TOKEN: ${HEALTH_BEARER_TOKEN:-}
      # Workers
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-5}
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/health | grep -q '\"status\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    networks:
      - kaasb_net
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "10"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.5"

  # ===========================================================================
  # Next.js Frontend
  # ===========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL:  https://${DOMAIN}/api/v1
        NEXT_PUBLIC_APP_NAME: Kaasb
    image: ghcr.io/${GITHUB_REPO:-mustafaalrasheed/kaasb}/frontend:${IMAGE_TAG:-latest}
    container_name: kaasb_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL:  https://${DOMAIN}/api/v1
      NEXT_PUBLIC_APP_NAME: Kaasb
      NEXT_PUBLIC_SITE_URL: https://${DOMAIN}
      NODE_ENV:             production
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - kaasb_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ===========================================================================
  # Certbot — Let's Encrypt SSL certificate management
  # First run: obtains certificate. After that: renews every 12 hours if needed.
  # ===========================================================================
  certbot:
    image: certbot/certbot:latest
    container_name: kaasb_certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Check for renewal every 12 hours; Certbot only actually renews if <30 days remaining
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot --webroot-path=/var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

# =============================================================================
# Networks — isolate app traffic from host
# =============================================================================
networks:
  kaasb_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    labels:
      com.kaasb.backup: "true"
  redis_data:
  backend_uploads:
  nginx_logs:
  letsencrypt:      # SSL certificates — persisted across container restarts
  certbot_www:      # ACME challenge files served by nginx on port 80
