# =============================================================================
# Kaasb Platform — PostgreSQL 16 Production Configuration
# Tuned for Hetzner CPX22: 2 AMD vCPU, 4 GB RAM, NVMe SSD
# =============================================================================
# Apply with: POSTGRES_EXTRA_ARGS="-c config_file=/etc/postgresql/postgresql.conf"
# Or mount at /etc/postgresql/postgresql.conf and reference in docker-compose.

# ---------------------------------------------------------------------------
# Memory Settings  (rule of thumb: shared_buffers = 25% RAM on dedicated server)
# CPX22 = 4GB RAM, Docker backend uses ~1GB, leaving ~3GB for PostgreSQL
# ---------------------------------------------------------------------------
shared_buffers              = 512MB     # 25% of allocated memory
effective_cache_size        = 1536MB    # OS + PG cache estimate (75% of available)
work_mem                    = 8MB       # Per sort/hash operation (workers × sessions)
maintenance_work_mem        = 128MB     # VACUUM, CREATE INDEX, etc.
wal_buffers                 = 16MB      # WAL write buffer (auto = -1 works too)
huge_pages                  = off       # Not available in most VPS environments

# ---------------------------------------------------------------------------
# I/O & Checkpoints  (NVMe SSD — can handle more I/O than spinning disk)
# ---------------------------------------------------------------------------
random_page_cost            = 1.1       # SSD: near sequential (default 4.0 = HDD)
effective_io_concurrency    = 200       # Concurrent I/O requests (SSD)
checkpoint_completion_target = 0.9      # Spread checkpoint I/O over 90% of interval
checkpoint_timeout          = 10min     # Max time between checkpoints
max_wal_size                = 1GB       # Allow WAL to grow before checkpoint
min_wal_size                = 80MB

# ---------------------------------------------------------------------------
# Connections  (async FastAPI pool: max 5 workers × pool_size 5 = 25 max needed)
# ---------------------------------------------------------------------------
max_connections             = 50        # Keep low — use connection pooling
superuser_reserved_connections = 3

# ---------------------------------------------------------------------------
# Parallel Query  (CPX22 has 2 vCPU — limit parallelism to avoid contention)
# ---------------------------------------------------------------------------
max_worker_processes        = 2
max_parallel_workers        = 2
max_parallel_workers_per_gather = 1
max_parallel_maintenance_workers = 1

# ---------------------------------------------------------------------------
# WAL & Replication
# ---------------------------------------------------------------------------
wal_level                   = replica   # Required for logical replication if needed
archive_mode                = off       # No WAL archiving (use pg_dump for backups)

# ---------------------------------------------------------------------------
# Autovacuum  (keep tables clean — important for high-write platforms)
# ---------------------------------------------------------------------------
autovacuum                  = on
autovacuum_max_workers      = 2         # CPX22: 2 workers max
autovacuum_naptime          = 1min
autovacuum_vacuum_cost_delay = 2ms      # Throttle I/O impact of autovacuum

# ---------------------------------------------------------------------------
# Logging  (structured for production monitoring)
# ---------------------------------------------------------------------------
log_destination             = 'stderr'
logging_collector           = off       # Docker captures stderr directly
log_min_duration_statement  = 1000      # Log queries taking > 1 second
log_line_prefix             = '%m [%p] %u@%d '
log_timezone                = 'UTC'

# ---------------------------------------------------------------------------
# Locale & Timezone
# ---------------------------------------------------------------------------
timezone                    = 'UTC'
lc_messages                 = 'en_US.UTF-8'
lc_monetary                 = 'en_US.UTF-8'
lc_numeric                  = 'en_US.UTF-8'
lc_time                     = 'en_US.UTF-8'

# ---------------------------------------------------------------------------
# Security  (connections restricted by pg_hba.conf — no external access)
# ---------------------------------------------------------------------------
ssl                         = off       # SSL terminated at Nginx level
