upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:3000;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m   rate=30r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# ── Shared proxy settings (used in both HTTP and HTTPS blocks) ─
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ════════════════════════════════════════════════════════════
# HTTP  —  serves Let's Encrypt ACME challenge, redirects rest
# ════════════════════════════════════════════════════════════
server {
    listen 80;
    # ▼ CHANGE THIS to your domain when using HTTPS
    server_name _;

    # Let's Encrypt ACME challenge (needed before enabling HTTPS)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # ── HTTPS redirect ──────────────────────────────────────
    # Uncomment the two lines below AFTER your SSL certificate
    # is in place (Step 12 of the deployment guide).
    # Also change server_name above to your actual domain.
    #
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    # ── HTTP-only proxy (active until SSL is enabled) ───────
    # Comment out all the location blocks below once you have
    # SSL and the redirect above is uncommented.

    # Security headers
    add_header X-Frame-Options          "DENY"                          always;
    add_header X-Content-Type-Options   "nosniff"                       always;
    add_header X-XSS-Protection         "1; mode=block"                 always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    client_max_body_size 10M;

    location /api/v1/auth/login {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /uploads/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /health {
        access_log off;
        proxy_pass http://backend/api/v1/health;
    }

    location / {
        proxy_pass http://frontend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

