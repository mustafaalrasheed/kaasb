# =============================================================================
# Kaasb Platform — Nginx Production Configuration
# Hetzner CPX22 · kaasb.com · Let's Encrypt SSL
# =============================================================================
# This file is included inside the http{} block by the default nginx config.
# Upstream, map, limit_req_zone, and log_format directives are all valid here.

# DNS resolver (required for ssl_stapling_verify + upstream health)
resolver 8.8.8.8 1.1.1.1 valid=300s;
resolver_timeout 5s;

# ---------------------------------------------------------------------------
# WebSocket upgrade map — prevents hardcoded "upgrade" on non-WS connections
# ---------------------------------------------------------------------------
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ---------------------------------------------------------------------------
# Upstream pools with keepalive (reuse TCP connections — lower latency)
# ---------------------------------------------------------------------------
upstream backend {
    server backend:8000;
    keepalive 32;
}

upstream frontend {
    server frontend:3000;
    keepalive 16;
}

# ---------------------------------------------------------------------------
# Rate-limiting zones  (stored in shared memory segments)
# ---------------------------------------------------------------------------
limit_req_zone $binary_remote_addr zone=api:10m    rate=30r/s;
limit_req_zone $binary_remote_addr zone=login:10m  rate=5r/m;
limit_req_zone $binary_remote_addr zone=uploads:10m rate=10r/m;
limit_req_log_level warn;
limit_req_status    429;

# ---------------------------------------------------------------------------
# Structured JSON access log (parsed by Grafana Loki, Datadog, etc.)
# ---------------------------------------------------------------------------
log_format json_combined escape=json
    '{'
        '"time":"$time_iso8601",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes_sent":$bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_time":"$upstream_response_time",'
        '"ip":"$http_x_forwarded_for",'
        '"host":"$host",'
        '"ua":"$http_user_agent",'
        '"request_id":"$http_x_request_id"'
    '}';

# =============================================================================
# HTTP (port 80) — ACME challenge + redirect to HTTPS
# =============================================================================
server {
    listen 80;
    server_name kaasb.com www.kaasb.com;

    # Let's Encrypt / Certbot webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # All other traffic → permanent HTTPS redirect (non-www)
    location / {
        return 301 https://kaasb.com$request_uri;
    }
}

# =============================================================================
# HTTPS (port 443) — main production server
# =============================================================================
server {
    listen 443 ssl;
    http2 on;
    server_name kaasb.com www.kaasb.com;

    # ----- TLS — Let's Encrypt certificates ---------------------------------
    ssl_certificate     /etc/letsencrypt/live/kaasb.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kaasb.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/kaasb.com/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers   ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # Redirect www → non-www (single canonical domain)
    if ($host = www.kaasb.com) {
        return 301 https://kaasb.com$request_uri;
    }

    # ----- Logging -----------------------------------------------------------
    access_log /var/log/nginx/kaasb.access.log json_combined;
    error_log  /var/log/nginx/kaasb.error.log  warn;

    # ----- Security headers --------------------------------------------------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "DENY"                                         always;
    add_header X-Content-Type-Options     "nosniff"                                      always;
    add_header X-XSS-Protection           "0"                                            always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"     always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://api.stripe.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # ----- General settings --------------------------------------------------
    client_max_body_size 10M;
    server_tokens        off;

    # ----- Gzip compression --------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1000;
    gzip_comp_level   5;
    gzip_proxied      any;
    gzip_types
        text/plain text/css application/json application/javascript
        text/xml application/xml image/svg+xml application/wasm;

    # ----- Custom error pages ------------------------------------------------
    error_page 502 /502.html;
    error_page 503 /503.html;
    location = /502.html { root /etc/nginx/error_pages; internal; }
    location = /503.html { root /etc/nginx/error_pages; internal; }

    # =========================================================================
    # Route-specific locations (most specific first)
    # =========================================================================

    # Auth endpoints — very strict rate limit
    location ~ ^/api/v1/auth/(login|register)$ {
        limit_req zone=login burst=3 nodelay;
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Qi Card webhook — no rate limit, raw body passthrough
    location = /api/v1/payments/qi-card/webhook {
        proxy_pass              http://backend;
        proxy_http_version      1.1;
        proxy_set_header        Connection        "";
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_request_buffering off;  # Pass raw bytes for HMAC verification
        proxy_read_timeout      30s;
    }

    # WebSocket (real-time notifications & chat)
    location /api/v1/ws/ {
        proxy_pass          http://backend;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        $connection_upgrade;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # All other API routes
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $http_x_request_id;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }

    # API docs (only visible when backend enables them — DEBUG mode)
    location ~ ^/(docs|redoc|openapi\.json)$ {
        limit_req zone=api burst=5 nodelay;
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host      $host;
    }

    # Uploaded user files — 30-day browser cache
    location /uploads/ {
        limit_req zone=uploads burst=20 nodelay;
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host      $host;
        expires            30d;
        add_header         Cache-Control "public, immutable";
    }

    # Next.js static assets — 1-year immutable cache (content-hashed filenames)
    location /_next/static/ {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host      $host;
        expires            1y;
        add_header         Cache-Control "public, immutable";
        access_log         off;
    }

    # Health check — no access log to prevent log spam
    location = /health {
        access_log off;
        proxy_pass         http://backend/api/v1/health;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host      $host;
    }

    # Everything else → Next.js frontend
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
