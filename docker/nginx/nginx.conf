# =============================================================================
# Kaasb Platform — Nginx Production Configuration
# =============================================================================
# Included inside the http{} block by nginx default config (/etc/nginx/nginx.conf
# includes conf.d/*.conf), so upstream/map/limit_req_zone directives are valid here.

# DNS resolver for ssl_stapling_verify (Google + Cloudflare)
resolver 8.8.8.8 1.1.1.1 valid=300s;
resolver_timeout 5s;

# ---------------------------------------------------------------------------
# WebSocket upgrade map — avoids hardcoded "upgrade" on non-WS requests
# ---------------------------------------------------------------------------
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ---------------------------------------------------------------------------
# Upstream pools with keepalive (fewer TCP handshakes to app containers)
# ---------------------------------------------------------------------------
upstream backend {
    server backend:8000;
    keepalive 32;
}

upstream frontend {
    server frontend:3000;
    keepalive 16;
}

# ---------------------------------------------------------------------------
# Rate-limiting zones  (stored in 10 MB shared memory)
# ---------------------------------------------------------------------------
limit_req_zone $binary_remote_addr zone=api:10m    rate=30r/s;
limit_req_zone $binary_remote_addr zone=login:10m  rate=5r/m;
limit_req_zone $binary_remote_addr zone=uploads:10m rate=10r/m;

# Rate-limit logging — only log when a request is actually dropped
limit_req_log_level warn;
limit_req_status 429;

# ---------------------------------------------------------------------------
# Structured JSON access log format (parsed by log aggregators)
# ---------------------------------------------------------------------------
log_format json_combined escape=json
    '{'
        '"time":"$time_iso8601",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes_sent":$bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_time":"$upstream_response_time",'
        '"ip":"$http_x_forwarded_for",'
        '"host":"$host",'
        '"user_agent":"$http_user_agent",'
        '"request_id":"$http_x_request_id"'
    '}';

# =============================================================================
# HTTP — redirect to HTTPS + serve ACME challenge
# =============================================================================
server {
    listen 80;
    server_name kaasb.com www.kaasb.com;

    # Let's Encrypt webroot challenge (must work before certs exist)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Everything else → permanent redirect to HTTPS (non-www)
    location / {
        return 301 https://kaasb.com$request_uri;
    }
}

# =============================================================================
# HTTPS — main production server
# =============================================================================
server {
    listen 443 ssl;
    http2 on;
    server_name kaasb.com www.kaasb.com;

    # ----- SSL / TLS ----------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/kaasb.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kaasb.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/kaasb.com/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ----- Redirect www → non-www --------------------------------------------
    if ($host = www.kaasb.com) {
        return 301 https://kaasb.com$request_uri;
    }

    # ----- Logging -----------------------------------------------------------
    access_log /var/log/nginx/kaasb.access.log json_combined;
    error_log  /var/log/nginx/kaasb.error.log  warn;

    # ----- Security headers --------------------------------------------------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "DENY"                                        always;
    add_header X-Content-Type-Options     "nosniff"                                     always;
    add_header X-XSS-Protection           "0"                                           always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"             always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"    always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://api.stripe.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
        always;

    # ----- General settings --------------------------------------------------
    client_max_body_size 10M;
    server_tokens off;

    # ----- Gzip --------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_comp_level 5;
    gzip_proxied any;
    gzip_types
        text/plain text/css application/json application/javascript
        text/xml application/xml image/svg+xml application/wasm;

    # =========================================================================
    # Locations
    # =========================================================================

    # --- Login: strict rate limit -------------------------------------------
    location = /api/v1/auth/login {
        limit_req zone=login burst=3 nodelay;

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $http_x_request_id;
    }

    location = /api/v1/auth/register {
        limit_req zone=login burst=3 nodelay;

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # --- Qi Card webhook — no rate limit, skip body buffering ---------------
    location = /api/v1/payments/qi-card/webhook {
        proxy_pass             http://backend;
        proxy_http_version     1.1;
        proxy_set_header       Connection        "";
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_read_timeout     30s;
    }

    # --- WebSocket endpoint (real-time notifications) -----------------------
    location /api/v1/ws/ {
        proxy_pass          http://backend;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        $connection_upgrade;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;  # Keep WS connections alive for 1 hour
        proxy_send_timeout  3600s;
    }

    # --- All other API routes -----------------------------------------------
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";   # Enable keepalive to upstream
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $http_x_request_id;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }

    # --- API docs (debug — only if backend exposes them) --------------------
    location ~ ^/(docs|redoc|openapi\.json)$ {
        limit_req zone=api burst=5 nodelay;
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host      $host;
    }

    # --- Uploaded user files — long-lived cache -----------------------------
    location /uploads/ {
        limit_req zone=uploads burst=20 nodelay;
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host      $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # --- Health check — no access log (avoids log spam) --------------------
    location = /health {
        access_log off;
        proxy_pass         http://backend/api/v1/health;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host      $host;
    }

    # --- Next.js static assets — immutable, long cache ---------------------
    location /_next/static/ {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host      $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- Everything else → Next.js frontend ---------------------------------
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
