<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaasb — Scheduled Maintenance</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8fafc;display:flex;align-items:center;justify-content:center;min-height:100vh;color:#1e293b}
  .card{background:#fff;border-radius:16px;padding:48px;max-width:480px;width:90%;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.07)}
  .icon{font-size:56px;margin-bottom:24px}
  h1{font-size:24px;font-weight:700;margin-bottom:8px}
  p{color:#64748b;line-height:1.6;margin-bottom:8px}
  small{color:#94a3b8;font-size:13px;margin-top:16px;display:block}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🔧</div>
  <h1>Scheduled Maintenance</h1>
  <p>Kaasb is undergoing planned maintenance to improve your experience.</p>
  <p>We'll be back shortly — check <strong>@kaasb</strong> for updates.</p>
  <small>Error 503 — Service Unavailable</small>
</div>
</body>
</html>
