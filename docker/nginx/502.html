<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>502 — Kaasb is restarting</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8fafc;display:flex;align-items:center;justify-content:center;min-height:100vh;color:#1e293b}
  .card{background:#fff;border-radius:16px;padding:48px;max-width:480px;width:90%;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.07)}
  .icon{font-size:56px;margin-bottom:24px}
  h1{font-size:24px;font-weight:700;margin-bottom:8px}
  p{color:#64748b;line-height:1.6;margin-bottom:24px}
  a{display:inline-block;background:#2563eb;color:#fff;padding:12px 28px;border-radius:8px;text-decoration:none;font-weight:600;transition:opacity .2s}
  a:hover{opacity:.85}
  small{color:#94a3b8;font-size:13px;margin-top:16px;display:block}
</style>
</head>
<body>
<div class="card">
  <div class="icon">⚙️</div>
  <h1>We'll be right back</h1>
  <p>Kaasb is currently restarting or deploying an update. This usually takes less than 60 seconds.</p>
  <a href="javascript:location.reload()">Refresh page</a>
  <small>Error 502 — Bad Gateway</small>
</div>
</body>
</html>
