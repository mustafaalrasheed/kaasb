# =============================================================================
# Kaasb Platform — Alertmanager Configuration
# Routes alerts from Prometheus to Discord (critical/high) and email (medium/low)
# =============================================================================
#
# Required environment variables (set in .env.production):
#   ALERTMANAGER_DISCORD_WEBHOOK_URL  — Discord channel webhook URL
#   ALERTMANAGER_SMTP_FROM            — Sender email address (Gmail)
#   ALERTMANAGER_SMTP_TO              — Recipient email address
#   ALERTMANAGER_SMTP_AUTH_USERNAME   — Gmail username
#   ALERTMANAGER_SMTP_AUTH_PASSWORD   — Gmail 16-char app password
#
# HOW TO GET A DISCORD WEBHOOK:
#   1. Discord channel settings → Integrations → Webhooks → New Webhook
#   2. Copy webhook URL (https://discord.com/api/webhooks/<id>/<token>)
# =============================================================================

global:
  resolve_timeout: 5m
  smtp_smarthost:  'smtp.gmail.com:587'
  smtp_from:       '${ALERTMANAGER_SMTP_FROM}'
  smtp_auth_username: '${ALERTMANAGER_SMTP_AUTH_USERNAME}'
  smtp_auth_password: '${ALERTMANAGER_SMTP_AUTH_PASSWORD}'
  smtp_require_tls: true

# ─── Templates ────────────────────────────────────────────────────────────────
templates:
  - /etc/alertmanager/templates/*.tmpl

# ─── Routing tree ─────────────────────────────────────────────────────────────
route:
  # Default receiver for anything that doesn't match a sub-route
  receiver: email_ops
  group_by: [alertname, severity]
  group_wait:      30s    # Wait before sending first notification for a group
  group_interval:  5m     # Wait before re-notifying about the same group
  repeat_interval: 4h     # Re-send unresolved alerts every 4 hours

  routes:
    # Critical alerts → Discord immediately (no grouping delay)
    - matchers:
        - severity = critical
      receiver: discord_critical
      group_wait:      0s
      group_interval:  1m
      repeat_interval: 30m
      continue: true    # Also send to default receiver

    # High severity → Discord with slight delay (batch nearby alerts)
    - matchers:
        - severity = high
      receiver: discord_high
      group_wait:      30s
      group_interval:  5m
      repeat_interval: 2h

    # Medium severity → email only
    - matchers:
        - severity = medium
      receiver: email_ops
      group_wait:      5m
      group_interval:  30m
      repeat_interval: 12h

    # Inhibit low-severity alerts when critical is firing for same component
    - matchers:
        - severity = low
      receiver: email_ops
      repeat_interval: 24h

# ─── Inhibition rules ────────────────────────────────────────────────────────
# Suppress lower-severity alerts when a critical alert is already firing
inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity =~ high|medium|low
    equal: [alertname]

  # If API is down, suppress latency/error-rate alerts (they're symptoms)
  - source_matchers:
      - alertname = APIDown
    target_matchers:
      - alertname =~ HighErrorRate|HighLatencyP95|CriticalLatencyP99

  # If Postgres is down, suppress all DB-related alerts
  - source_matchers:
      - alertname = PostgresDown
    target_matchers:
      - alertname =~ DBPoolExhaustion|HighPostgresConnections|SlowQueriesDetected

# ─── Receivers ───────────────────────────────────────────────────────────────
receivers:

  # Discord — critical alerts (fires immediately, every 30 min until resolved)
  - name: discord_critical
    discord_configs:
      - webhook_url: '${ALERTMANAGER_DISCORD_WEBHOOK_URL}'
        send_resolved: true
        title: '🚨 CRITICAL — {{ .CommonAnnotations.summary }}'
        message: |
          **Status:** {{ .Status | toUpper }}
          {{ range .Alerts }}
          **Alert:** {{ .Labels.alertname }}
          **Description:** {{ .Annotations.description }}
          **Severity:** {{ .Labels.severity }}
          **Since:** {{ .StartsAt.Format "2006-01-02 15:04:05 MST" }}
          {{ if .Annotations.runbook }}**Runbook:** {{ .Annotations.runbook }}{{ end }}
          {{ end }}

  # Discord — high severity (batched, every 2 hours)
  - name: discord_high
    discord_configs:
      - webhook_url: '${ALERTMANAGER_DISCORD_WEBHOOK_URL}'
        send_resolved: true
        title: '⚠️ HIGH — {{ .CommonAnnotations.summary }}'
        message: |
          **Status:** {{ .Status | toUpper }}
          {{ range .Alerts }}
          **Alert:** {{ .Labels.alertname }}
          **Description:** {{ .Annotations.description }}
          **Since:** {{ .StartsAt.Format "2006-01-02 15:04:05 MST" }}
          {{ end }}

  # Email — medium/low/default
  - name: email_ops
    email_configs:
      - to:           '${ALERTMANAGER_SMTP_TO}'
        send_resolved: true
        headers:
          Subject: '[Kaasb {{ .Status | title }}] {{ .CommonAnnotations.summary }}'
        html: |
          <h2>{{ .CommonAnnotations.summary }}</h2>
          <p><strong>Environment:</strong> production</p>
          <table border="1" cellpadding="5">
            <tr><th>Alert</th><th>Description</th><th>Since</th><th>Severity</th></tr>
            {{ range .Alerts }}
            <tr>
              <td>{{ .Labels.alertname }}</td>
              <td>{{ .Annotations.description }}</td>
              <td>{{ .StartsAt }}</td>
              <td>{{ .Labels.severity }}</td>
            </tr>
            {{ end }}
          </table>
          {{ if .CommonAnnotations.runbook }}
          <p><strong>Runbook:</strong> {{ .CommonAnnotations.runbook }}</p>
          {{ end }}
