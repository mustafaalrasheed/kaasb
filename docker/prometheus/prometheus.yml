global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    environment: production
    app: kaasb

# Load alerting rules
rule_files:
  - /etc/prometheus/alert_rules.yml

# Alertmanager connection
alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]

# =============================================================================
# Scrape configurations
# =============================================================================
scrape_configs:

  # Prometheus itself
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  # Host system metrics (CPU, RAM, disk, network)
  - job_name: node
    static_configs:
      - targets: [node_exporter:9100]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: kaasb-server

  # Docker container metrics
  - job_name: cadvisor
    static_configs:
      - targets: [cadvisor:8080]
    metric_relabel_configs:
      # Only keep metrics for our containers
      - source_labels: [container_label_com_docker_compose_project]
        regex: kaasb.*
        action: keep

  # FastAPI backend — exposes /metrics via prometheus-fastapi-instrumentator
  # Access via internal Docker network only (not exposed externally)
  - job_name: fastapi
    static_configs:
      - targets: [backend:8000]
    metrics_path: /metrics
    scrape_interval: 15s
    # Label all metrics from this job
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: kaasb-api

  # PostgreSQL metrics exporter
  - job_name: postgres
    static_configs:
      - targets: [postgres_exporter:9187]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: kaasb-db

  # Redis metrics exporter
  - job_name: redis
    static_configs:
      - targets: [redis_exporter:9121]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: kaasb-redis
