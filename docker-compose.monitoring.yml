# =============================================================================
# Kaasb Platform — Monitoring Stack
# Prometheus + Grafana + Node Exporter + cAdvisor
# =============================================================================
# Usage:
#   docker compose -f docker-compose.prod.yml -f docker-compose.monitoring.yml \
#       --env-file .env.production up -d
#
# Access Grafana at: http://YOUR_SERVER_IP:3001  (or tunnel via SSH)
# SSH tunnel:  ssh -L 3001:localhost:3001 root@YOUR_SERVER_IP
# =============================================================================

services:

  # ===========================================================================
  # Prometheus — metrics collection
  # ===========================================================================
  prometheus:
    image: prom/prometheus:v2.49.0
    container_name: kaasb_prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-lifecycle
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    networks:
      - kaasb_net
      - monitoring_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ===========================================================================
  # Grafana — dashboards & alerting
  # ===========================================================================
  grafana:
    image: grafana/grafana:10.2.2
    container_name: kaasb_grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"   # Only on loopback — access via SSH tunnel
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-CHANGE_ME_GRAFANA_PASSWORD}
      GF_SERVER_ROOT_URL:         http://localhost:3001
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - monitoring_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  # ===========================================================================
  # Node Exporter — host metrics (CPU, RAM, disk, network)
  # ===========================================================================
  node_exporter:
    image: prom/node-exporter:v1.7.0
    container_name: kaasb_node_exporter
    restart: unless-stopped
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro,rslave
    networks:
      - monitoring_net
    pid: host
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.1"

  # ===========================================================================
  # cAdvisor — Docker container metrics
  # ===========================================================================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: kaasb_cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /cgroup:/cgroup:ro
    networks:
      - monitoring_net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.15"

  # ===========================================================================
  # Alertmanager — routes Prometheus alerts to Discord / email
  # entrypoint.sh renders ${VAR} placeholders from env before launching
  # alertmanager (it doesn't expand env vars natively)
  # ===========================================================================
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: kaasb_alertmanager
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    volumes:
      - ./docker/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml.tpl:ro
      - ./docker/alertmanager/entrypoint.sh:/entrypoint.sh:ro
      - alertmanager_data:/alertmanager
    environment:
      ALERTMANAGER_DISCORD_WEBHOOK_URL: ${ALERTMANAGER_DISCORD_WEBHOOK_URL:-}
      ALERTMANAGER_SMTP_FROM:           ${ALERTMANAGER_SMTP_FROM:-}
      ALERTMANAGER_SMTP_TO:             ${ALERTMANAGER_SMTP_TO:-}
      ALERTMANAGER_SMTP_AUTH_USERNAME:  ${ALERTMANAGER_SMTP_AUTH_USERNAME:-}
      ALERTMANAGER_SMTP_AUTH_PASSWORD:  ${ALERTMANAGER_SMTP_AUTH_PASSWORD:-}
    networks:
      - monitoring_net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.1"

  # ===========================================================================
  # PostgreSQL Exporter — exports pg_stat_* metrics to Prometheus
  # ===========================================================================
  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: kaasb_postgres_exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?sslmode=disable"
      PG_EXPORTER_AUTO_DISCOVER_DATABASES: "false"
    networks:
      - kaasb_net
      - monitoring_net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.1"

  # ===========================================================================
  # Redis Exporter — exports Redis metrics to Prometheus
  # ===========================================================================
  redis_exporter:
    image: oliver006/redis_exporter:v1.57.0
    container_name: kaasb_redis_exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    networks:
      - kaasb_net
      - monitoring_net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: "0.05"

networks:
  # kaasb_net is defined in docker-compose.prod.yml; when both composes are
  # passed to `docker compose -f ... -f ...` it merges into the same project
  # and this reference resolves automatically. If you ever run this monitoring
  # compose file standalone, change to `external: true`.
  kaasb_net:
  monitoring_net:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:
