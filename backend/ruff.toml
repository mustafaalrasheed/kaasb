# Kaasb Platform — Ruff Linter Configuration
# Docs: https://docs.astral.sh/ruff/

target-version = "py311"
line-length = 120

[lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "N",      # pep8-naming
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "SIM",    # flake8-simplify
    "T20",    # flake8-print (no print statements)
    "RET",    # flake8-return
    "C4",     # flake8-comprehensions
    "PTH",    # flake8-use-pathlib
    "LOG",    # flake8-logging — enforce lazy % formatting
    "G",      # flake8-logging-format
    "ASYNC",  # flake8-async
]
ignore = [
    "E501",    # line too long (handled by formatter)
    "B008",    # function call in default argument (FastAPI Depends)
    "RET504",  # unnecessary assignment before return
    "UP007",   # use X | Y for union types (not yet everywhere)
    "SIM108",  # use ternary operator (sometimes less readable)
    "UP042",   # StrEnum migration — str+Enum pattern still valid in SQLAlchemy
    "N802",    # lowercase function name — Pydantic validators use field name convention
    "ASYNC230", # blocking open in async — used in sync helper functions
    "LOG014",  # exc_info outside handler — used intentionally in global exception handler
]

[lint.per-file-ignores]
"app/models/*.py" = ["F821"]     # forward references in SQLAlchemy
"app/models/__init__.py" = ["F401"]  # unused imports in barrel file
"app/schemas/__init__.py" = ["F401"]

[lint.isort]
known-first-party = ["app"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
