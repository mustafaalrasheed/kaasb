<!DOCTYPE html>
<html lang="{{ lang | default('ar') }}" dir="{{ dir | default('rtl') }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ subject | default('Kaasb') }}</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; background: #f4f7f9; color: #333; }
  .wrapper { max-width: 600px; margin: 0 auto; padding: 20px; }
  .card { background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .header { background: linear-gradient(135deg, #338bff 0%, #1354e1 100%); padding: 32px 40px; text-align: center; }
  .header .logo { color: #ffffff; font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  .header .tagline { color: rgba(255,255,255,0.85); font-size: 13px; margin-top: 4px; }
  .body { padding: 40px; }
  .body h1 { font-size: 22px; color: #1a1a2e; margin-bottom: 16px; font-weight: 600; }
  .body p { font-size: 15px; line-height: 1.7; color: #555; margin-bottom: 16px; }
  .btn { display: inline-block; background: #338bff; color: #ffffff !important; text-decoration: none; padding: 14px 32px; border-radius: 8px; font-size: 15px; font-weight: 600; margin: 8px 0 24px; }
  .btn:hover { background: #1a6af5; }
  .divider { border: none; border-top: 1px solid #e8ecef; margin: 24px 0; }
  .link-note { font-size: 12px; color: #999; word-break: break-all; }
  .footer { background: #f8fafc; padding: 24px 40px; text-align: center; }
  .footer p { font-size: 12px; color: #aaa; line-height: 1.6; }
  .footer a { color: #338bff; text-decoration: none; }
</style>
</head>
<body>
<div class="wrapper">
  <div class="card">
    <div class="header">
      <div class="logo">كاسب | Kaasb</div>
      <div class="tagline">منصة المستقلين العراقية | Iraq's Freelancing Platform</div>
    </div>
    <div class="body">
      {% block content %}{% endblock %}
    </div>
    <div class="footer">
      <p>© 2025 Kaasb Technology. جميع الحقوق محفوظة | All rights reserved.</p>
      <p><a href="https://kaasb.com">kaasb.com</a> · <a href="https://kaasb.com/privacy">Privacy</a> · <a href="mailto:support@kaasb.com">Support</a></p>
    </div>
  </div>
</div>
</body>
</html>
