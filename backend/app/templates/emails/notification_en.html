{% extends "base.html" %}
{% block content %}
<h1>{{ title }}</h1>
<p>{{ message }}</p>
{% if link_url %}
<a class="btn" href="{{ link_url }}">View details</a>
<hr class="divider" />
<p class="link-note">{{ link_url }}</p>
{% endif %}
<p style="font-size:12px;color:#aaa;margin-top:24px;">
  To stop receiving notification emails, go to your account settings.
</p>
{% endblock %}
