# Mypy configuration for the Kaasb backend.
# CLI flags in ci.yml (--ignore-missing-imports, --python-version 3.12,
# --disable-error-code import-untyped) take precedence over [mypy] defaults
# but per-module overrides below are additive.

[mypy]
python_version = 3.12
ignore_missing_imports = True
no_error_summary = True

# ── SQLAlchemy model files ────────────────────────────────────────────────────
# Relationships use forward-reference strings ("ClassName") resolved at runtime.
# TYPE_CHECKING imports would create circular references, so we suppress the
# name-defined errors here instead of polluting every model file.
[mypy-app.models.*]
disable_error_code = name-defined

# ── Data-retention cron script ───────────────────────────────────────────────
# session.execute(delete(...)) returns CursorResult at runtime, which has
# .rowcount. Mypy types it as Result[Any] (base class without rowcount).
[mypy-app.tasks.*]
disable_error_code = attr-defined

# ── Database connection pool ─────────────────────────────────────────────────
# engine.pool is typed as Pool (base); at runtime it's AsyncAdaptedQueuePool
# which exposes size() and overflow(). The try/except already guards errors.
[mypy-app.core.database]
disable_error_code = attr-defined

# ── Health endpoint ───────────────────────────────────────────────────────────
# pool.size() / pool.checkedout() exist on AsyncAdaptedQueuePool at runtime.
[mypy-app.api.v1.endpoints.health]
disable_error_code = attr-defined

# ── Service layer ─────────────────────────────────────────────────────────────
# Several false positives from mypy's inability to narrow Optional types after
# guard clauses, and from dynamic attributes set on ORM objects at runtime.
[mypy-app.services.payment_service]
disable_error_code = attr-defined,assignment

[mypy-app.services.review_service]
disable_error_code = arg-type

[mypy-app.services.auth_service]
disable_error_code = attr-defined

[mypy-app.services.admin_service]
disable_error_code = arg-type

[mypy-app.services.gig_service]
disable_error_code = arg-type

[mypy-app.services.message_service]
disable_error_code = attr-defined,arg-type

[mypy-app.services.contract_service]
disable_error_code = attr-defined

# ── Sentry integration ────────────────────────────────────────────────────────
# before_send signature changed in sentry-sdk 2.x; we use the runtime-correct
# form (dict, dict) → dict | None which works fine at runtime.
[mypy-app.main]
disable_error_code = arg-type
