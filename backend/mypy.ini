# Mypy configuration for the Kaasb backend.
# CLI flags in ci.yml (--ignore-missing-imports, --python-version 3.12,
# --disable-error-code import-untyped) take precedence over [mypy] defaults
# but per-module overrides below are additive.

[mypy]
python_version = 3.12
ignore_missing_imports = True
no_error_summary = True

# ── SQLAlchemy model files ────────────────────────────────────────────────────
# Relationships use forward-reference strings ("ClassName") resolved at runtime.
# TYPE_CHECKING imports would create circular references, so we suppress the
# name-defined errors here instead of polluting every model file.
[mypy-app.models.*]
disable_error_codes = name-defined

# ── Data-retention cron script ───────────────────────────────────────────────
# session.execute(delete(...)) returns CursorResult at runtime, which has
# .rowcount. Mypy types it as Result[Any] (base class without rowcount).
[mypy-app.tasks.*]
disable_error_codes = attr-defined

# ── Database connection pool ─────────────────────────────────────────────────
# engine.pool is typed as Pool (base); at runtime it's AsyncAdaptedQueuePool
# which exposes size() and overflow(). The try/except already guards errors.
[mypy-app.core.database]
disable_error_codes = attr-defined
