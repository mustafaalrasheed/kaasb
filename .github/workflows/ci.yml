name: Kaasb CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}

# Cancel in-progress runs on the same branch (saves CI minutes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Backend: lint → security → type-check → migrate → test → coverage
  # ===========================================================================
  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt

      # ---- Lint ----
      - name: Lint (ruff)
        run: |
          cd backend
          ruff check app/

      # ---- Security scan ----
      - name: Security scan (pip-audit)
        run: |
          pip install pip-audit
          cd backend
          pip-audit -r requirements.txt --skip-editable || true

      # ---- Type check ----
      - name: Type check (mypy)
        continue-on-error: true
        run: |
          cd backend
          mypy app/ --ignore-missing-imports --no-error-summary \
            --python-version 3.12 \
            --disable-error-code import-untyped

      # ---- Migration safety check ----
      - name: Check for uncommitted migrations (alembic check)
        continue-on-error: true
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_pass@localhost:5432/test_db
          REDIS_URL:    redis://localhost:6379/0
          SECRET_KEY:   ci-test-secret-key-do-not-use
          ENVIRONMENT:  testing
        run: |
          cd backend
          alembic upgrade head
          alembic check && echo "✓ No pending schema changes" || \
            echo "WARNING: Model changes detected with no migration. Run: alembic revision --autogenerate"

      # ---- API tests ----
      - name: Run API tests
        continue-on-error: true
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_pass@localhost:5432/test_db
          REDIS_URL:    redis://localhost:6379/0
          SECRET_KEY:   ci-test-secret-key-do-not-use
          ENVIRONMENT:  testing
          DEBUG:        "true"
        run: |
          cd backend
          uvicorn app.main:app --host 0.0.0.0 --port 8000 > /tmp/server.log 2>&1 &
          SERVER_PID=$!

          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/v1/health > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "Server process died. Last 50 log lines:"
              tail -50 /tmp/server.log
              exit 1
            fi
            sleep 1
          done

          python test_api.py
          TEST_EXIT=$?
          kill $SERVER_PID 2>/dev/null || true

          if [ $TEST_EXIT -ne 0 ]; then
            echo "=== Server logs (last 80 lines) ==="
            tail -80 /tmp/server.log
          fi
          exit $TEST_EXIT

      # ---- pytest + coverage (if pytest tests exist) ----
      - name: Run pytest with coverage
        continue-on-error: true
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_pass@localhost:5432/test_db
          REDIS_URL:    redis://localhost:6379/0
          SECRET_KEY:   ci-test-secret-key-do-not-use
          ENVIRONMENT:  testing
        run: |
          cd backend
          if find tests/ -name "test_*.py" -type f 2>/dev/null | grep -q .; then
            pytest tests/ \
              --cov=app \
              --cov-report=xml:coverage.xml \
              --cov-report=term-missing \
              --junitxml=junit-backend.xml \
              -q
          else
            echo "No pytest test files found in tests/ — skipping coverage step"
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            backend/coverage.xml
            backend/junit-backend.xml
          if-no-files-found: ignore
          retention-days: 7

  # ===========================================================================
  # Frontend: lint → type-check → security → build
  # ===========================================================================
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Lint (ESLint)
        run: |
          cd frontend
          npm run lint

      - name: Type check (tsc)
        run: |
          cd frontend
          npx tsc --noEmit

      # ---- Security scan ----
      - name: Security scan (npm audit)
        run: |
          cd frontend
          npm audit --audit-level=high || true

      - name: Build (Next.js)
        env:
          NEXT_PUBLIC_API_URL:      https://kaasb.com/api/v1
          NEXT_PUBLIC_APP_NAME:     Kaasb
          NEXT_PUBLIC_ENVIRONMENT:  production
        run: |
          cd frontend
          npm run build

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/.next/
          if-no-files-found: warn
          retention-days: 1

  # ===========================================================================
  # Docker: build & push to GHCR on main branch only
  # ===========================================================================
  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/backend/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/backend:latest
            ${{ env.IMAGE_BASE }}/backend:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./docker/frontend/Dockerfile
          target: production
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://kaasb.com/api/v1
            NEXT_PUBLIC_APP_NAME=Kaasb
            NEXT_PUBLIC_ENVIRONMENT=production
          tags: |
            ${{ env.IMAGE_BASE }}/frontend:latest
            ${{ env.IMAGE_BASE }}/frontend:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Output image digest
        run: |
          echo "Backend:  ${{ env.IMAGE_BASE }}/backend:sha-${{ github.sha }}"
          echo "Frontend: ${{ env.IMAGE_BASE }}/frontend:sha-${{ github.sha }}"
