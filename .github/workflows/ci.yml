name: Kaasb CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}

# Cancel in-progress runs on the same branch (saves CI minutes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Backend: lint → type-check → migrate → test
  # ===========================================================================
  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          cd backend
          ruff check app/

      - name: Type check (mypy)
        run: |
          cd backend
          mypy app/ --ignore-missing-imports --no-error-summary

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_pass@localhost:5432/test_db
          REDIS_URL:    redis://localhost:6379/0
          SECRET_KEY:   ci-test-secret-key-do-not-use
          ENVIRONMENT:  testing
        run: |
          cd backend
          alembic upgrade head

      - name: Start server & run API tests
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_pass@localhost:5432/test_db
          REDIS_URL:    redis://localhost:6379/0
          SECRET_KEY:   ci-test-secret-key-do-not-use
          ENVIRONMENT:  testing
          DEBUG:        "true"
        run: |
          cd backend
          uvicorn app.main:app --host 0.0.0.0 --port 8000 > /tmp/server.log 2>&1 &
          SERVER_PID=$!

          # Wait up to 30s for server to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/v1/health > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "Server process died. Last 50 log lines:"
              tail -50 /tmp/server.log
              exit 1
            fi
            sleep 1
          done

          python test_api.py
          TEST_EXIT=$?
          kill $SERVER_PID 2>/dev/null || true

          if [ $TEST_EXIT -ne 0 ]; then
            echo "=== Server logs (last 80 lines) ==="
            tail -80 /tmp/server.log
          fi
          exit $TEST_EXIT

  # ===========================================================================
  # Frontend: lint → type-check → build
  # ===========================================================================
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint (ESLint)
        run: |
          cd frontend
          npm run lint

      - name: Type check (tsc)
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Build (Next.js)
        env:
          NEXT_PUBLIC_API_URL:  https://kaasb.com/api/v1
          NEXT_PUBLIC_APP_NAME: Kaasb
        run: |
          cd frontend
          npm run build

  # ===========================================================================
  # Docker: build & push to GHCR on main branch
  # ===========================================================================
  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}/backend
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./docker/backend/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/backend:latest
            ${{ env.IMAGE_BASE }}/backend:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./docker/frontend/Dockerfile
          target: production
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://kaasb.com/api/v1
            NEXT_PUBLIC_APP_NAME=Kaasb
          tags: |
            ${{ env.IMAGE_BASE }}/frontend:latest
            ${{ env.IMAGE_BASE }}/frontend:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Output image digest
        run: |
          echo "Backend image: ${{ env.IMAGE_BASE }}/backend:sha-${{ github.sha }}"
          echo "Frontend image: ${{ env.IMAGE_BASE }}/frontend:sha-${{ github.sha }}"
