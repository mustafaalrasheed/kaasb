name: Kaasb CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # === Backend Tests ===
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install gunicorn

      - name: Lint with ruff
        run: |
          cd backend
          pip install ruff
          ruff check app/

      - name: Type check
        run: |
          cd backend
          pip install mypy
          mypy app/ --ignore-missing-imports --no-error-summary || true

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_pass@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key
          ENVIRONMENT: testing
        run: |
          cd backend
          alembic upgrade head

      - name: Start server and run tests
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_pass@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key
          ENVIRONMENT: testing
          DEBUG: "true"
        run: |
          cd backend
          uvicorn app.main:app --host 0.0.0.0 --port 8000 > /tmp/server.log 2>&1 &
          SERVER_PID=$!
          # Wait for server to be ready (up to 30s)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/v1/health > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "Server process died. Logs:"
              cat /tmp/server.log
              exit 1
            fi
            sleep 1
          done
          python test_api.py || TEST_EXIT=$?
          TEST_EXIT=${TEST_EXIT:-0}
          kill $SERVER_PID 2>/dev/null || true
          if [ $TEST_EXIT -ne 0 ]; then
            echo ""
            echo "=== Server logs (last 80 lines) ==="
            tail -80 /tmp/server.log
          fi
          exit $TEST_EXIT

  # === Frontend Build ===
  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint
        run: |
          cd frontend
          npm run lint || true

      - name: Type check
        run: |
          cd frontend
          npx tsc --noEmit || true

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
          NEXT_PUBLIC_APP_NAME: Kaasb
        run: |
          cd frontend
          npm run build

  # === Docker Build (on main only) ===
  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: |
          docker build \
            -f docker/backend/Dockerfile \
            --target production \
            -t kaasb-backend:latest \
            ./backend

      - name: Build frontend image
        run: |
          docker build \
            -f docker/frontend/Dockerfile \
            --target production \
            --build-arg NEXT_PUBLIC_API_URL=https://yourdomain.com/api/v1 \
            --build-arg NEXT_PUBLIC_APP_NAME=Kaasb \
            -t kaasb-frontend:latest \
            ./frontend

      - name: Images built successfully
        run: |
          docker images | grep kaasb
          echo "✅ Docker images ready for deployment"
