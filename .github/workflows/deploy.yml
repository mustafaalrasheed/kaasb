name: Kaasb Deploy to Production

# =============================================================================
# Triggers:
#   1. Auto-deploy when CI passes on main branch
#   2. Manual deploy via GitHub Actions UI (emergency or specific tag)
# =============================================================================
on:
  workflow_run:
    workflows: ["Kaasb CI"]
    branches: [main]
    types: [completed]

  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (sha-abc1234 or 'latest')"
        required: false
        default: latest
      skip_backup:
        description: "Skip pre-deploy DB backup (emergency only)"
        required: false
        default: "false"

env:
  REGISTRY:   ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}
  # Opt into Node.js 24 runtime to silence Node 20 deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Prevent concurrent deploys to the same environment.
# cancel-in-progress: false ensures a running deploy is never aborted mid-flight.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Hetzner CPX22
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Only run if CI passed (for workflow_run trigger)
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success')

    # Protect production deployments — requires GitHub environment "production"
    environment: production

    steps:
      # -----------------------------------------------------------------------
      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            # Must match the full SHA used by CI's docker/build-push-action
            TAG="sha-${{ github.event.workflow_run.head_sha }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Deploying tag: ${TAG}"

      # -----------------------------------------------------------------------
      - name: Validate required secrets
        run: |
          [ -n "${{ secrets.SERVER_HOST }}"      ] || (echo "Missing SERVER_HOST secret"      && exit 1)
          [ -n "${{ secrets.SERVER_USER }}"      ] || (echo "Missing SERVER_USER secret"      && exit 1)
          [ -n "${{ secrets.SSH_PRIVATE_KEY }}"  ] || (echo "Missing SSH_PRIVATE_KEY secret"  && exit 1)
          echo "All required secrets are present."

      # -----------------------------------------------------------------------
      - name: Deploy via SSH
        id: deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          port:     2222
          timeout:  600s
          script: |
            set -euo pipefail
            cd /opt/kaasb

            NEW_TAG="${{ steps.tag.outputs.tag }}"
            SKIP_BACKUP="${{ github.event.inputs.skip_backup || 'false' }}"
            # Include BOTH compose files so monitoring-stack changes
            # (docker-compose.monitoring.yml) auto-apply on deploy, not
            # just app-tier changes. Without this, edits to node_exporter,
            # prometheus, alertmanager, etc. require manual docker compose
            # up -d against the monitoring file — which bit us in Phase 2.
            COMPOSE="docker compose -f docker-compose.prod.yml -f docker-compose.monitoring.yml --env-file .env.production"

            echo "=================================================="
            echo "  Deploying Kaasb — tag: ${NEW_TAG}"
            echo "  Time: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo "=================================================="

            # ---- Validate environment before touching anything ----
            bash scripts/validate-env.sh .env.production

            # ---- Pull latest code (nginx.conf, compose files, scripts) ----
            git fetch --quiet origin main
            git reset --hard origin/main

            # ---- Save current IMAGE_TAG for rollback ----
            CURRENT_TAG=$(grep '^IMAGE_TAG=' .env.production | cut -d= -f2 || echo "latest")
            echo "${CURRENT_TAG}" > .release.previous
            echo "Previous tag: ${CURRENT_TAG} → New tag: ${NEW_TAG}"

            # ---- Update IMAGE_TAG in .env.production ----
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${NEW_TAG}/" .env.production

            # ---- Log in to GHCR ----
            echo "${{ secrets.GITHUB_TOKEN }}" | \
                docker login ghcr.io -u ${{ github.actor }} --password-stdin 2>/dev/null || true

            # ---- Pull or build images ----
            echo "Pulling images from GHCR..."
            if ! $COMPOSE pull backend frontend 2>/dev/null; then
                echo "GHCR pull failed — building images locally..."
                $COMPOSE build backend frontend
            fi

            # ---- Pre-deploy database backup ----
            if [ "${SKIP_BACKUP}" != "true" ]; then
                echo "Creating pre-deploy backup..."
                bash scripts/backup.sh && echo "Backup OK"
            else
                echo "WARN: Skipping backup (skip_backup=true)"
            fi

            # ---- Run Alembic migrations (needs DB, so no --no-deps) ----
            echo "Running migrations..."
            $COMPOSE run --rm backend alembic upgrade head
            echo "Migrations complete."

            # ---- Seed gig categories (idempotent — skips if already seeded) ----
            echo "Seeding gig categories..."
            $COMPOSE run --rm backend python -m scripts.seed_categories && echo "Categories OK" || \
                echo "WARN: seed_categories failed (non-blocking — categories may already exist)"

            # ---- Reconcile monitoring stack with current config (idempotent) ----
            # docker compose up -d is a no-op if running config matches; recreates
            # only services whose definition changed. This is how we pick up
            # docker-compose.monitoring.yml edits without manual intervention.
            echo "Reconciling monitoring stack..."
            $COMPOSE up -d prometheus alertmanager grafana node_exporter cadvisor postgres_exporter redis_exporter 2>/dev/null || \
                echo "WARN: monitoring reconcile failed (non-blocking — app deploy continues)"

            # ---- Rolling restart: backend first, then frontend ----
            echo "Restarting backend..."
            $COMPOSE up -d --no-deps backend

            echo "Waiting for backend health..."
            HEALTHY=false
            for i in $(seq 1 40); do
                STATUS=$(docker inspect --format='{{.State.Health.Status}}' kaasb_backend 2>/dev/null || echo "missing")
                if [ "$STATUS" = "healthy" ]; then
                    echo "Backend healthy (attempt $i)"
                    HEALTHY=true
                    break
                fi
                if [ "$STATUS" = "unhealthy" ]; then
                    echo "Backend is unhealthy — triggering rollback"
                    break
                fi
                sleep 5
            done

            if [ "$HEALTHY" != "true" ]; then
                echo "ERROR: Backend health check failed after 200s"
                echo "Rolling back to ${CURRENT_TAG}..."
                sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${CURRENT_TAG}/" .env.production
                $COMPOSE pull backend
                $COMPOSE up -d --no-deps backend
                exit 1
            fi

            echo "Restarting frontend..."
            $COMPOSE up -d --no-deps frontend

            # ---- Wait for frontend ----
            for i in $(seq 1 24); do
                STATUS=$(docker inspect --format='{{.State.Health.Status}}' kaasb_frontend 2>/dev/null || echo "missing")
                [ "$STATUS" = "healthy" ] && break
                sleep 5
            done

            # ---- Reload nginx (pick up any new config) ----
            docker exec kaasb_nginx nginx -s reload 2>/dev/null || true

            # ---- Final health check through nginx ----
            sleep 5
            if curl -sf https://kaasb.com/health | grep -q '"status"'; then
                echo "Platform is healthy at https://kaasb.com"
            else
                echo "WARN: Final health check could not reach https://kaasb.com/health"
                echo "(SSL may be misconfigured or nginx still reloading)"
            fi

            # ---- Cleanup old images ----
            docker image prune -f --filter "until=72h" > /dev/null

            echo "=================================================="
            echo "  Deployment SUCCESSFUL: ${NEW_TAG}"
            echo "=================================================="

      # -----------------------------------------------------------------------
      - name: Notify success (Telegram)
        if: success()
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d text="✅ <b>Kaasb deployed</b>
          Tag: <code>${{ steps.tag.outputs.tag }}</code>
          By: ${{ github.actor }}
          <a href='https://kaasb.com'>kaasb.com</a>" > /dev/null

      # -----------------------------------------------------------------------
      - name: Notify failure (Telegram)
        if: failure()
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d text="❌ <b>Kaasb deploy FAILED</b>
          Tag: <code>${{ steps.tag.outputs.tag }}</code>
          By: ${{ github.actor }}
          <a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>View logs</a>" > /dev/null
